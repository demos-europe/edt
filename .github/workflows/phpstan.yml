name: phpstan

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon'

jobs:
  phpstan8_1:
    name: phpstan @ PHP 8.1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2, phpstan:1.8.2
          ini-values: memory_limit=256M

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run phpstan
        run: phpstan analyse -c phpstan.neon --memory-limit=256M --no-progress
